<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho da janela do navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/pequeno-300.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/media-700.png" type="image/png">
        <img src="imagens/grande-1000.png" alt="imagem grande">
    </picture>
</body>
</html>
